<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>

<button onclick="start()">
TEST KAMERY
</button>

<div id="reader"></div>

<script>

function start(){

  const scanner =
    new Html5QrcodeScanner(
      "reader",
      {
        fps:10,
        qrbox:250
      }
    );

  scanner.render(
    text => alert(text),
    err => {}
  );

}

</script>

</body>
</html>
