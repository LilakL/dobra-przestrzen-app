<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Dobra Przestrzeń</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
  font-family:Arial,sans-serif;
  background:#f5f5f5;
  margin:0;
  padding:15px;
}

.card{
  background:#fff;
  border-radius:14px;
  padding:15px;
  margin-bottom:15px;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
}

h1{
  margin:0;
}

button,
select{
  width:100%;
  padding:14px;
  font-size:18px;
  margin-top:8px;
  border-radius:10px;
}

.primary{
  background:#0f766e;
  color:#fff;
  border:none;
}

.big{
  font-size:24px;
  font-weight:bold;
}

#clientBox{
  display:none;
}
.modeCard{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.checkinBtn{
  background:#16a34a;
  color:white;
  border:none;
  font-weight:bold;
  font-size:22px;
}

.rechargeBtn{
  background:#2563eb;
  color:white;
  border:none;
  font-weight:bold;
  font-size:22px;
}

.activeMode{
  box-shadow:0 0 0 4px rgba(0,0,0,.15);
}

.resultOk{
  background:#dcfce7;
  border-left:6px solid #16a34a;
  padding:15px;
  border-radius:10px;
}

.resultRecharge{
  background:#dbeafe;
  border-left:6px solid #2563eb;
  padding:15px;
  border-radius:10px;
}

.resultName{
  font-size:28px;
  font-weight:bold;
  margin-bottom:10px;
}

.resultValue{
  font-size:36px;
  font-weight:bold;
}
</style>

</head>

<body>

<div class="card">

<h1>Dobra Przestrzeń V1000 TEST</h1>

<div id="operator">
Ładowanie...
</div>

</div>

<div class="card">

<h3>Zajęcia</h3>

<select id="scheduleSelect">
<option>Ładowanie...</option>
</select>

</div>
<div class="card modeCard">

<button
id="checkinBtn"
class="checkinBtn activeMode"
onclick="setMode('checkin')">

✅ CHECK-IN

</button>

<select id="rechargeAmount">

<option value="1">+1</option>
<option value="2">+2</option>
<option value="3">+3</option>
<option value="4">+4</option>
<option value="5">+5</option>
<option value="6">+6</option>
<option value="7">+7</option>
<option value="8">+8</option>
<option value="9">+9</option>
<option value="10">+10</option>
<option value="15">+15</option>
<option value="20">+20</option>

</select>

<button
id="rechargeBtn"
class="rechargeBtn"
onclick="setMode('recharge')">

➕ DOŁADUJ

</button>

</div>
<div class="card">

<button
class="primary"
onclick="startScanner()">
URUCHOM SKANER QR
</button>

<div id="reader"></div>

</div>

<div
id="clientBox"
class="card">

<div
id="clientName"
class="big">
</div>

<div
id="clientRemain">
</div>

</div>

<script>

const TOKEN =
new URLSearchParams(
  window.location.search
).get("token") || "";
alert("TOKEN=" + TOKEN);
const API_URL =
"https://script.google.com/macros/s/AKfycbw9xYY7qrNakOsqttH7nnV21MYAVCOkSw1MfAmN8RACMfWq1PvQgV8-7Z5fraPN10GoQQ/exec";

let scanner = null;
let lastScan = "";
let lastScanTime = 0;
let mode = "checkin";
async function api(action,data={}){

  const params =
    new URLSearchParams({
      action,
      ...data
    });

const url =
  API_URL + "?" + params.toString();

alert(url);

const response =
  await fetch(url);

alert(response.status);

const txt =
  await response.text();

alert(txt);

return JSON.parse(txt);

}
async function init(){

  alert("INIT START");

  try{

const operator =
  await api(
    "operator",
    {
      token:TOKEN
    }
  );

alert(JSON.stringify(operator));

document
      .getElementById(
        "operator"
      )
      .innerHTML =
      "Operator: <b>" +
      operator.name +
      "</b>";

const schedule =
  await api("schedule");

alert("Schedule loaded: " + schedule.length);

const sel =
      document.getElementById(
        "scheduleSelect"
      );

    sel.innerHTML = "";

    schedule.forEach(x=>{

      const o =
        document.createElement(
          "option"
        );

      o.value =
        x.day +
        "|" +
        x.hour +
        "|" +
        x.className;

      o.textContent =
        x.day +
        " | " +
        x.hour +
        " | " +
        x.className;

      sel.appendChild(o);

    });

  }
  catch(err){

    alert(
      "Błąd inicjalizacji:\n" +
      err.message
    );

  }

}
function setMode(newMode){

  mode = newMode;

  document
    .getElementById("checkinBtn")
    .classList.remove("activeMode");

  document
    .getElementById("rechargeBtn")
    .classList.remove("activeMode");

  if(mode==="checkin"){

    document
      .getElementById("checkinBtn")
      .classList.add("activeMode");

  }else{

    document
      .getElementById("rechargeBtn")
      .classList.add("activeMode");

  }

}
function startScanner(){

  if(scanner){
    return;
  }

  scanner =
    new Html5QrcodeScanner(
      "reader",
      {
        fps:10,
        qrbox:250
      }
    );

  scanner.render(
    onScanSuccess,
    ()=>{}
  );

}

async function onScanSuccess(text){



  const now = Date.now();

  if(
    text === lastScan &&
    (now-lastScanTime) < 5000
  ){
    return;
  }

  lastScan = text;
  lastScanTime = now;

  try{

const clientId =
  String(text)
    .split("|")[0]
    .replace(/\s/g,"")
    .trim();


const selected =
  document
    .getElementById("scheduleSelect")
    .value
    .split("|");

const day =
  selected[0];

const hour =
  selected[1];

const className =
  selected[2];

let result;

if(mode === "checkin"){

  result =
    await api(
      "checkin",
      {
        token:TOKEN,
        clientId:clientId,
        day:day,
        hour:hour,
        className:className
      }
    );

}else{

  const rechargeAmount =
    Number(
      document.getElementById(
        "rechargeAmount"
      ).value
    );

  result =
    await api(
      "recharge",
      {
        token:TOKEN,
        clientId:clientId,
        amount:rechargeAmount
      }
    );

if(!result.ok){

  alert(result.msg);
  return;

}

const preview =
  await api(
    "preview",
    {
      token:TOKEN,
      clientId:clientId
    }
  );
    "preview",
    {
      token:TOKEN,
      clientId:clientId
    }
  );

    document
      .getElementById(
        "clientBox"
      )
      .style.display =
      "block";

    document
      .getElementById(
        "clientName"
      )
      .innerHTML =
      preview.name;

const rechargeAmount =
  document.getElementById(
    "rechargeAmount"
  ).value;

document
  .getElementById(
    "clientRemain"
  )
  .innerHTML =

(mode==="checkin"
 ? "✅ CHECK-IN OK"
 : "➕ DOŁADOWANIE +" +
   rechargeAmount)

+

"<br><br>Aktualny stan: <b>" +

preview.remaining +

"</b>";
setTimeout(()=>{

  document
    .getElementById(
      "clientBox"
    )
    .style.display =
    "none";

},2000);
  }
  catch(err){

    alert(
      "Błąd skanowania:\n" +
      err.message
    );

  }

}

window.onload =
  init;

</script>

</body>
</html>
