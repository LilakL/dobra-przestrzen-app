<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Dobra Przestrzeń</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
  font-family:Arial,sans-serif;
  background:#f5f5f5;
  margin:0;
  padding:15px;
}

.card{
  background:#fff;
  border-radius:14px;
  padding:15px;
  margin-bottom:15px;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
}

h1{
  margin:0;
}

button,
select{
  width:100%;
  padding:14px;
  font-size:18px;
  margin-top:8px;
  border-radius:10px;
}

.primary{
  background:#0f766e;
  color:#fff;
  border:none;
}

.big{
  font-size:24px;
  font-weight:bold;
}

#clientBox{
  display:none;
}

.modeCard{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.checkinBtn{
  background:#16a34a;
  color:white;
  border:none;
  font-weight:bold;
  font-size:22px;
}

.rechargeBtn{
  background:#2563eb;
  color:white;
  border:none;
  font-weight:bold;
  font-size:22px;
}
.addClientBtn{
  background:#7c3aed;
  color:white;
  border:none;
  font-weight:bold;
  font-size:22px;
  transition:.25s;
}

.addClientBtn:hover{
  transform:scale(1.03);
}

.addClientBtn:active{
  transform:scale(.97);
}
.activeMode{
  box-shadow:0 0 0 4px rgba(0,0,0,.15);
  transform:scale(1.03);
}

.resultOk{
  background:#dcfce7;
  border-left:6px solid #16a34a;
  padding:15px;
  border-radius:10px;
}

.resultRecharge{
  background:#dbeafe;
  border-left:6px solid #2563eb;
  padding:15px;
  border-radius:10px;
}

.resultError{
  background:#fee2e2;
  border-left:6px solid #dc2626;
  padding:15px;
  border-radius:10px;
}

.resultName{
  font-size:28px;
  font-weight:bold;
  margin-bottom:10px;
}

.resultValue{
  font-size:36px;
  font-weight:bold;
}
/* ===== NOWY UCZESTNIK ===== */

#addClientPanel{
  display:none;
  background:#fff;
  border-radius:14px;
  padding:18px;
  margin-top:15px;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
}

#addClientPanel h3{
  margin-top:0;
}

#addClientPanel input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:1px solid #d1d5db;
  font-size:17px;
  box-sizing:border-box;
}

.formButtons{
  display:flex;
  gap:10px;
  margin-top:12px;
}

.saveBtn{
  flex:1;
  background:#16a34a;
  color:#fff;
  border:none;
  font-weight:bold;
}

.cancelBtn{
  flex:1;
  background:#dc2626;
  color:#fff;
  border:none;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="card">

<h1>Dobra Przestrzeń</h1>

<div id="operator">
Ładowanie...
</div>

</div>

<div class="card">

<h3>Zajęcia</h3>

<select id="scheduleSelect">
<option>Ładowanie...</option>
</select>

</div>


<div class="card">

<button
class="primary"
onclick="startScanner()">
URUCHOM SKANER QR
</button>

<div id="reader"></div>

</div>

<div
id="clientBox"
class="card">

<div
id="clientName"
class="big">
</div>

<div
id="clientRemain">
</div>

</div>

<div class="card modeCard">

<button
id="checkinBtn"
class="checkinBtn activeMode"
onclick="executeCheckin()">

✅ CHECK-IN

</button>

<select id="rechargeAmount">

<option value="1">+1</option>
<option value="2">+2</option>
<option value="3">+3</option>
<option value="4">+4</option>
<option value="5">+5</option>
<option value="6">+6</option>
<option value="7">+7</option>
<option value="8">+8</option>
<option value="9">+9</option>
<option value="10">+10</option>
<option value="15">+15</option>
<option value="20">+20</option>

</select>

<button
id="rechargeBtn"
class="rechargeBtn"
onclick="executeRecharge()">

💳 DOŁADUJ

</button>

<button
id="addClientBtn"
class="addClientBtn"
onclick="showAddClient()">

👤 NOWY UCZESTNIK

</button>

</div>
  <div
id="addClientPanel"
class="card">

<h3>👤 Nowy uczestnik</h3>

<input
id="newName"
placeholder="Imię *">

<input
id="newSurname"
placeholder="Nazwisko *">

<input
id="newPhone"
placeholder="Telefon (opcjonalnie)">

<input
id="newEmail"
placeholder="Email (opcjonalnie)">

<div class="formButtons">

<button
class="saveBtn"
onclick="saveNewClient()">

💾 ZAPISZ

</button>

<button
class="cancelBtn"
onclick="closeAddClient()">

ANULUJ

</button>

</div>

</div>
<script>

const TOKEN =
new URLSearchParams(
  window.location.search
).get("token") || "";

const API_URL =
"https://script.google.com/macros/s/AKfycbw9xYY7qrNakOsqttH7nnV21MYAVCOkSw1MfAmN8RACMfWq1PvQgV8-7Z5fraPN10GoQQ/exec";

let scanner = null;
let lastScan = "";
let lastScanTime = 0;
let mode = "checkin";
let currentClientId = "";
let currentClient = null;
function beep(){

  const ctx =
    new (
      window.AudioContext ||
      window.webkitAudioContext
    )();

  const osc =
    ctx.createOscillator();

  osc.type = "sine";
  osc.frequency.value = 1000;

  osc.connect(ctx.destination);

  osc.start();

  setTimeout(()=>{
    osc.stop();
  },150);

}
async function api(action,data={}){

  const params =
    new URLSearchParams({
      action,
      ...data
    });

  const url =
    API_URL + "?" + params.toString();

  const response =
    await fetch(url);

  const txt =
    await response.text();

  return JSON.parse(txt);
}
async function apiPost(action,data={}){

  const response =
    await fetch(API_URL,{

      method:"POST",

      headers:{
        "Content-Type":"application/json"
      },

      body:JSON.stringify({

        action,

        ...data

      })

    });

  const txt =
    await response.text();

  return JSON.parse(txt);

}
function showResult(
  type,
  title,
  name,
  balance,
  before=""
){

  const box =
    document.getElementById("clientBox");

  box.className = "card";

if(type==="checkin"){

  box.classList.add("resultOk");

  beep();

  if(navigator.vibrate){
    navigator.vibrate([200,100,200]);
  }

}

if(type==="recharge"){

  box.classList.add("resultRecharge");

  beep();

  if(navigator.vibrate){
    navigator.vibrate([300,100,300]);
  }

}

if(type==="error"){

  box.classList.add("resultError");

  if(navigator.vibrate){
    navigator.vibrate([100,100,100,100]);
  }

}


  document.getElementById(
    "clientName"
  ).innerHTML =
    name || "";

  let html = title;

  if(before !== ""){

    html +=
      "<br><br>Stan: <b>" +
      before +
      " → " +
      balance +
      "</b>";

  }else{

    html +=
      "<br><br>Aktualny stan: <b>" +
      balance +
      "</b>";

  }

  document.getElementById(
    "clientRemain"
  ).innerHTML = html;

  box.style.display =
    "block";

  setTimeout(()=>{

    box.style.display =
      "none";

    lastScan = "";
    lastScanTime = 0;

  },3000);

}

async function init(){

  try{

    const operator =
      await api(
        "operator",
        {
          token:TOKEN
        }
      );

    document
      .getElementById("operator")
      .innerHTML =
      "Operator: <b>" +
      operator.name +
      "</b>";

    const schedule =
      await api("schedule");

    const sel =
      document.getElementById(
        "scheduleSelect"
      );

    sel.innerHTML = "";

    schedule.forEach(x=>{

      const o =
        document.createElement(
          "option"
        );

      o.value =
        x.day +
        "|" +
        x.hour +
        "|" +
        x.className;

      o.textContent =
        x.day +
        " | " +
        x.hour +
        " | " +
        x.className;

      sel.appendChild(o);

    });

  }
  catch(err){

    showResult(
      "error",
      "❌ Błąd inicjalizacji",
      "",
      err.message
    );

  }

}

function setMode(newMode){

  mode = newMode;

  document
    .getElementById("checkinBtn")
    .classList.remove("activeMode");

  document
    .getElementById("rechargeBtn")
    .classList.remove("activeMode");

  if(mode==="checkin"){

    document
      .getElementById("checkinBtn")
      .classList.add("activeMode");

  }else{

    document
      .getElementById("rechargeBtn")
      .classList.add("activeMode");

  }

  document
    .getElementById(
      "rechargeAmount"
    )
    .style.display =

    mode==="recharge"
      ? "block"
      : "none";

}
function startScanner(){

  if(scanner){
    return;
  }

  scanner =
    new Html5QrcodeScanner(
      "reader",
      {
        fps:10,
        qrbox:250
      }
    );

  scanner.render(
    onScanSuccess,
    ()=>{}
  );

}

async function onScanSuccess(text){

  const now = Date.now();

  if(
    text === lastScan &&
    (now-lastScanTime) < 5000
  ){
    return;
  }

  lastScan = text;
  lastScanTime = now;

  try{

    const clientId =
      String(text)
        .split("|")[0]
        .replace(/\s/g,"")
        .trim();

    const preview =
      await api(
        "preview",
        {
          token:TOKEN,
          clientId:clientId
        }
      );

    if(!preview.ok){

      showResult(
        "error",
        preview.msg,
        "",
        "-"
      );

      return;

    }

    currentClientId =
      clientId;

    currentClient =
      preview;

    document
      .getElementById(
        "clientBox"
      )
      .className =
      "card";

    document
      .getElementById(
        "clientBox"
      )
      .style.display =
      "block";

    document
      .getElementById(
        "clientName"
      )
      .innerHTML =

      preview.id +
      "<br>" +
      preview.name;

    document
      .getElementById(
        "clientRemain"
      )
      .innerHTML =

      "Aktualny stan: <b>" +
      preview.remaining +
      "</b><br><br>" +

      "Wybierz operację:";

  }
  catch(err){

    showResult(
      "error",
      "❌ Błąd skanowania",
      "",
      err.message
    );

  }

}
async function executeCheckin(){

  if(!currentClientId){

    showResult(
      "error",
      "Najpierw zeskanuj klienta",
      "",
      "-"
    );

    return;
  }

  const selected =
    document
      .getElementById("scheduleSelect")
      .value
      .split("|");

  const result =
    await api(
      "checkin",
      {
        token:TOKEN,
        clientId:currentClientId,
        day:selected[0],
        hour:selected[1],
        className:selected[2]
      }
    );

  if(!result.ok){

    showResult(
      "error",
      result.msg,
      "",
      "-"
    );

    return;
  }

  const preview =
    await api(
      "preview",
      {
        token:TOKEN,
        clientId:currentClientId
      }
    );

  showResult(
    "checkin",
    "✅ CHECK-IN OK",
    preview.id + "<br>" + preview.name,
    preview.remaining,
    result.before
  );

  currentClientId = "";
  currentClient = null;
}

async function executeRecharge(){

  if(!currentClientId){

    showResult(
      "error",
      "Najpierw zeskanuj klienta",
      "",
      "-"
    );

    return;
  }

  const amount =
    document
      .getElementById(
        "rechargeAmount"
      )
      .value;

  const result =
    await api(
      "recharge",
      {
        token:TOKEN,
        clientId:currentClientId,
        amount:amount
      }
    );

  if(!result.ok){

    showResult(
      "error",
      result.msg,
      "",
      "-"
    );

    return;
  }

  const preview =
    await api(
      "preview",
      {
        token:TOKEN,
        clientId:currentClientId
      }
    );

  showResult(
    "recharge",
    "➕ DOŁADOWANO +" + amount,
    preview.id + "<br>" + preview.name,
    preview.remaining,
    result.before
  );

  currentClientId = "";
  currentClient = null;
}

function showAddClient(){

    beep();

    document
      .getElementById("addClientPanel")
      .style.display="block";

    document
      .getElementById("newName")
      .focus();

}

function closeAddClient(){

    document
      .getElementById("addClientPanel")
      .style.display="none";

}
async function saveNewClient(){

  try{

    const firstName=document.getElementById("newName").value.trim();
    const lastName=document.getElementById("newSurname").value.trim();
    const phone=document.getElementById("newPhone").value.trim();
    const email=document.getElementById("newEmail").value.trim();

    if(firstName===""){
      alert("Podaj imię.");
      return;
    }

    if(lastName===""){
      alert("Podaj nazwisko.");
      return;
    }

    const emailRegex=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    if(email!=="" && !emailRegex.test(email)){
      alert("Niepoprawny adres e-mail.");
      return;
    }

let result=await api(
  "addClient",
      {
        token:TOKEN,
        firstName,
        lastName,
        phone,
        email,
        forceCreate:false
      }
    );

    if(result.duplicate){

      const force=confirm(
        "Uczestnik już istnieje:\n\n"+
        result.name+
        "\n"+
        result.id+
        "\n\nDodać mimo to?"
      );

      if(!force){
        return;
      }

result=await api(
  "addClient",
        {
          token:TOKEN,
          firstName,
          lastName,
          phone,
          email,
          forceCreate:true
        }
      );

    }

    if(!result.ok){
      alert(result.msg);
      return;
    }

    alert(
      "✅ Dodano uczestnika\n\nID: "+result.id
    );

    document.getElementById("newName").value="";
    document.getElementById("newSurname").value="";
    document.getElementById("newPhone").value="";
    document.getElementById("newEmail").value="";

    closeAddClient();

  }
  catch(err){

    console.error(err);

    alert(
      "Błąd połączenia z serwerem.\n\n"+
      err.message
    );

  }

}

window.onload = init;

</script>

</body>
</html>
