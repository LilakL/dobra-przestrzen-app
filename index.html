<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Dobra Przestrzeń</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
  font-family:Arial,sans-serif;
  background:#f5f5f5;
  margin:0;
  padding:15px;
}

.card{
  background:#fff;
  border-radius:14px;
  padding:15px;
  margin-bottom:15px;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
}

h1{
  margin:0;
}

button,
select{
  width:100%;
  padding:14px;
  font-size:18px;
  margin-top:8px;
  border-radius:10px;
}

.primary{
  background:#0f766e;
  color:#fff;
  border:none;
}

.big{
  font-size:24px;
  font-weight:bold;
}

#clientBox{
  display:none;
}

.modeCard{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.checkinBtn{
  background:#16a34a;
  color:white;
  border:none;
  font-weight:bold;
  font-size:22px;
}

.rechargeBtn{
  background:#2563eb;
  color:white;
  border:none;
  font-weight:bold;
  font-size:22px;
}

.activeMode{
  box-shadow:0 0 0 4px rgba(0,0,0,.15);
  transform:scale(1.03);
}

.resultOk{
  background:#dcfce7;
  border-left:6px solid #16a34a;
  padding:15px;
  border-radius:10px;
}

.resultRecharge{
  background:#dbeafe;
  border-left:6px solid #2563eb;
  padding:15px;
  border-radius:10px;
}

.resultError{
  background:#fee2e2;
  border-left:6px solid #dc2626;
  padding:15px;
  border-radius:10px;
}

.resultName{
  font-size:28px;
  font-weight:bold;
  margin-bottom:10px;
}

.resultValue{
  font-size:36px;
  font-weight:bold;
}

</style>
</head>

<body>

<div class="card">

<h1>Dobra Przestrzeń</h1>

<div id="operator">
Ładowanie...
</div>

</div>

<div class="card">

<h3>Zajęcia</h3>

<select id="scheduleSelect">
<option>Ładowanie...</option>
</select>

</div>


<div class="card">

<button
class="primary"
onclick="startScanner()">
URUCHOM SKANER QR
</button>

<div id="reader"></div>

</div>

<div
id="clientBox"
class="card">

<div
id="clientName"
class="big">
</div>

<div
id="clientRemain">
</div>

</div>

<div class="card modeCard">

<button
id="checkinBtn"
class="checkinBtn activeMode"
onclick="setMode('checkin')">

✅ CHECK-IN

</button>

<select id="rechargeAmount">

<option value="1">+1</option>
<option value="2">+2</option>
<option value="3">+3</option>
<option value="4">+4</option>
<option value="5">+5</option>
<option value="6">+6</option>
<option value="7">+7</option>
<option value="8">+8</option>
<option value="9">+9</option>
<option value="10">+10</option>
<option value="15">+15</option>
<option value="20">+20</option>

</select>

<button
id="rechargeBtn"
class="rechargeBtn"
onclick="setMode('recharge')">

➕ DOŁADUJ


</div>
<script>

const TOKEN =
new URLSearchParams(
  window.location.search
).get("token") || "";

const API_URL =
"https://script.google.com/macros/s/AKfycbw9xYY7qrNakOsqttH7nnV21MYAVCOkSw1MfAmN8RACMfWq1PvQgV8-7Z5fraPN10GoQQ/exec";

let scanner = null;
let lastScan = "";
let lastScanTime = 0;
let mode = "checkin";
let currentClientId = "";
let currentClient = null;
  
async function api(action,data={}){

  const params =
    new URLSearchParams({
      action,
      ...data
    });

  const url =
    API_URL + "?" + params.toString();

  const response =
    await fetch(url);

  const txt =
    await response.text();

  return JSON.parse(txt);
}

function showResult(
  type,
  title,
  name,
  balance,
  before=""
){

  const box =
    document.getElementById("clientBox");

  box.className = "card";

  if(type==="checkin"){
    box.classList.add("resultOk");
  }

  if(type==="recharge"){
    box.classList.add("resultRecharge");
  }

  if(type==="error"){
    box.classList.add("resultError");
  }

  if(navigator.vibrate){
    navigator.vibrate(150);
  }

  document.getElementById(
    "clientName"
  ).innerHTML =
    name || "";

  let html = title;

  if(before !== ""){

    html +=
      "<br><br>Stan: <b>" +
      before +
      " → " +
      balance +
      "</b>";

  }else{

    html +=
      "<br><br>Aktualny stan: <b>" +
      balance +
      "</b>";

  }

  document.getElementById(
    "clientRemain"
  ).innerHTML = html;

  box.style.display =
    "block";

  setTimeout(()=>{

    box.style.display =
      "none";

    lastScan = "";
    lastScanTime = 0;

  },3000);

}

async function init(){

  try{

    const operator =
      await api(
        "operator",
        {
          token:TOKEN
        }
      );

    document
      .getElementById("operator")
      .innerHTML =
      "Operator: <b>" +
      operator.name +
      "</b>";

    const schedule =
      await api("schedule");

    const sel =
      document.getElementById(
        "scheduleSelect"
      );

    sel.innerHTML = "";

    schedule.forEach(x=>{

      const o =
        document.createElement(
          "option"
        );

      o.value =
        x.day +
        "|" +
        x.hour +
        "|" +
        x.className;

      o.textContent =
        x.day +
        " | " +
        x.hour +
        " | " +
        x.className;

      sel.appendChild(o);

    });

  }
  catch(err){

    showResult(
      "error",
      "❌ Błąd inicjalizacji",
      "",
      err.message
    );

  }

}

function setMode(newMode){

  mode = newMode;

  document
    .getElementById("checkinBtn")
    .classList.remove("activeMode");

  document
    .getElementById("rechargeBtn")
    .classList.remove("activeMode");

  if(mode==="checkin"){

    document
      .getElementById("checkinBtn")
      .classList.add("activeMode");

  }else{

    document
      .getElementById("rechargeBtn")
      .classList.add("activeMode");

  }

  document
    .getElementById(
      "rechargeAmount"
    )
    .style.display =

    mode==="recharge"
      ? "block"
      : "none";

}
function startScanner(){

  if(scanner){
    return;
  }

  scanner =
    new Html5QrcodeScanner(
      "reader",
      {
        fps:10,
        qrbox:250
      }
    );

  scanner.render(
    onScanSuccess,
    ()=>{}
  );

}

async function onScanSuccess(text){

  const now = Date.now();

  if(
    text === lastScan &&
    (now-lastScanTime) < 5000
  ){
    return;
  }

  lastScan = text;
  lastScanTime = now;

  try{

    const clientId =
      String(text)
        .split("|")[0]
        .replace(/\s/g,"")
        .trim();

    const preview =
      await api(
        "preview",
        {
          token:TOKEN,
          clientId:clientId
        }
      );

    if(!preview.ok){

      showResult(
        "error",
        preview.msg,
        "",
        "-"
      );

      return;

    }

    currentClientId =
      clientId;

    currentClient =
      preview;

    document
      .getElementById(
        "clientBox"
      )
      .className =
      "card";

    document
      .getElementById(
        "clientBox"
      )
      .style.display =
      "block";

    document
      .getElementById(
        "clientName"
      )
      .innerHTML =

      preview.id +
      "<br>" +
      preview.name;

    document
      .getElementById(
        "clientRemain"
      )
      .innerHTML =

      "Aktualny stan: <b>" +
      preview.remaining +
      "</b><br><br>" +

      "Wybierz operację:";

  }
  catch(err){

    showResult(
      "error",
      "❌ Błąd skanowania",
      "",
      err.message
    );

  }

}
async function executeAction(){

if(!currentClientId){

```
showResult(
  "error",
  "Najpierw zeskanuj klienta",
  "",
  "-"
);

return;
```

}

const selected =
document
.getElementById(
"scheduleSelect"
)
.value
.split("|");

const day =
selected[0];

const hour =
selected[1];

const className =
selected[2];

let result;

if(mode==="checkin"){

```
result =
  await api(
    "checkin",
    {
      token:TOKEN,
      clientId:currentClientId,
      day:day,
      hour:hour,
      className:className
    }
  );
```

}else{

```
const rechargeAmount =
  document
    .getElementById(
      "rechargeAmount"
    )
    .value;

result =
  await api(
    "recharge",
    {
      token:TOKEN,
      clientId:currentClientId,
      amount:rechargeAmount
    }
  );
```

}

if(!result.ok){

```
showResult(
  "error",
  "❌ " + result.msg,
  "",
  "-"
);

return;
```

}

const preview =
await api(
"preview",
{
token:TOKEN,
clientId:currentClientId
}
);

if(mode==="checkin"){

```
showResult(
  "checkin",
  "✅ CHECK-IN OK",
  preview.id + "<br>" +
  preview.name,
  preview.remaining,
  result.before
);
```

}else{

```
const rechargeAmount =
  document
    .getElementById(
      "rechargeAmount"
    )
    .value;

showResult(
  "recharge",
  "➕ DOŁADOWANO +" +
  rechargeAmount,
  preview.id + "<br>" +
  preview.name,
  preview.remaining,
  result.before
);
```

}

currentClientId = "";
currentClient = null;

}

window.onload = init;

</script>

</body>
</html>
